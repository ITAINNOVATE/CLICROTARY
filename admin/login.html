<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - CLIC Rotary</title>
    <link rel="stylesheet" href="assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-body">
    <div class="login-card">
        <div class="sidebar-logo">
            <i class="fas fa-gear"></i> CLIC Rotary Admin
        </div>
        <h2>Connexion</h2>
        <div id="error-alert" class="alert alert-danger"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="admin@example.com">
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem; margin-top: 1rem;">
                Se connecter
            </button>
        </form>
    </div>

    <script src="assets/js/admin.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('error-alert');

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    errorAlert.textContent = "Erreur de connexion : " + (error.message || "Identifiants invalides");
                    errorAlert.style.display = 'block';
                } else {
                    window.location.href = 'index.html';
                }
            } catch (err) {
                errorAlert.textContent = "Une erreur est survenue lors de la connexion.";
                errorAlert.style.display = 'block';
            }
        });

        // Redirect if already logged in
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>

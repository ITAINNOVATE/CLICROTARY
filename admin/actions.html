<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Actions - CLIC Rotary Admin</title>
    <link rel="stylesheet" href="assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/admin.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo"><i class="fas fa-gear"></i> CLIC Rotary</div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-home"></i> Tableau de bord</a></li>
            <li class="nav-item"><a href="clubs.html" class="nav-link"><i class="fas fa-users"></i> Clubs</a></li>
            <li class="nav-item"><a href="actions.html" class="nav-link active"><i class="fas fa-hand-holding-heart"></i> Actions</a></li>
            <li class="nav-item"><a href="news.html" class="nav-link"><i class="fas fa-newspaper"></i> Actualités</a></li>
        </ul>
        <a onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
    </div>

    <main class="main-content">
        <header class="header">
            <h1>Gestion des Actions</h1>
            <button class="btn btn-primary" onclick="openModal()">+ Nouvelle Action</button>
        </header>

        <div class="data-card">
            <!-- Tab Navigation -->
            <div class="tab-nav">
                <button class="tab-nav-btn active" onclick="switchTab('all', this)">Toutes les actions</button>
                <button class="tab-nav-btn" onclick="switchTab('pending', this)">
                    En attente <span id="pending-count" class="count-pill" style="display:none;">0</span>
                </button>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Titre</th>
                        <th>Type</th>
                        <th>Année</th>
                        <th>Statut</th>
                        <th>Visibilité</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="actions-tbody">
                    <tr><td colspan="6">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="action-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; overflow-y:auto;">
        <div style="background:white; margin:5% auto; padding:2rem; width:90%; max-width:800px; border-radius:8px;">
            <h2 id="modal-title">Nouvelle Action</h2>
            <form id="action-form" style="margin-top:1.5rem;">
                <input type="hidden" id="action-id">
                <div class="stats-grid" style="grid-template-columns:1fr 1fr;">
                    <div class="form-group">
                        <label>Titre de l'Action</label>
                        <input type="text" id="action-title" required>
                    </div>
                    <div class="form-group">
                        <label>Club Responsable</label>
                        <select id="action-club-id" required style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:4px;">
                            <script>
                                // Will be populated dynamically
                            </script>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Domaine (Type)</label>
                        <input type="text" id="action-type" placeholder="Ex: Santé, Éducation">
                    </div>
                    <div class="form-group">
                        <label>Année</label>
                        <input type="text" id="action-year" placeholder="2026">
                    </div>
                    <div class="form-group">
                        <label>Statut</label>
                        <select id="action-status" required style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:4px;">
                            <option value="Réalisée">Réalisée</option>
                            <option value="En cours">En cours</option>
                            <option value="À venir">À venir</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Lieu</label>
                        <input type="text" id="action-location">
                    </div>
                    <div class="form-group">
                        <label>Image de Couverture (URL)</label>
                        <input type="text" id="action-image" placeholder="Ex: https://lien-image.jpg">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="action-description" rows="4" style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:4px;"></textarea>
                </div>
                <div class="stats-grid" style="grid-template-columns:1fr 1fr;">
                    <div class="form-group">
                        <label>Bénéficiaires</label>
                        <input type="text" id="action-beneficiaries">
                    </div>
                    <div class="form-group">
                        <label>Résultats</label>
                        <input type="text" id="action-results">
                    </div>
                    <div class="form-group">
                        <label>Partenaires</label>
                        <input type="text" id="action-partners" placeholder="Ex: Mairie, ONG, Ministère...">
                    </div>
                </div>
                <h3 style="margin: 1.5rem 0 0.75rem; padding-top: 1rem; border-top: 1px solid #eee; color: #005DAA;">Galerie Photos (3 photos supplémentaires)</h3>
                <div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr;">
                    <div class="form-group">
                        <label>Photo 2 (URL)</label>
                        <input type="text" id="action-photo2" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Photo 3 (URL)</label>
                        <input type="text" id="action-photo3" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Photo 4 (URL)</label>
                        <input type="text" id="action-photo4" placeholder="https://...">
                    </div>
                </div>
                <!-- Validation -->
                <div class="form-group checkbox-group" style="margin-top: 1rem; padding: 1rem; background: #f8f9fa; border-radius: 4px;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: bold; cursor: pointer;">
                        <input type="checkbox" id="action-approved" style="width: 20px; height: 20px;">
                        Action Approuvée (Visible publiquement sur le site)
                    </label>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:1.5rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const tbody = document.getElementById('actions-tbody');
        const modal = document.getElementById('action-modal');
        const form = document.getElementById('action-form');
        const clubSelect = document.getElementById('action-club-id');

        let allActions = [];
        let currentTab = 'all';

        async function fetchClubs() {
            const { data } = await supabaseClient.from('clubs').select('id, name').order('name');
            if (data) {
                clubSelect.innerHTML = '<option value="">Sélectionner un club</option>' + 
                    data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            }
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTable();
        }

        function renderTable() {
            const filtered = currentTab === 'pending'
                ? allActions.filter(a => !a.is_approved)
                : allActions;

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 2rem; color:#666;">
                    ${currentTab === 'pending' ? '✅ Aucune action en attente d\'approbation.' : 'Aucune action.'}</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(action => {
                window._actionsMap = window._actionsMap || {};
                window._actionsMap[action.id] = action;
                return `
                <tr ${!action.is_approved ? 'style="background:#fffbf0;"' : ''}>
                    <td>
                        <strong>${action.title}</strong>
                        ${action.description ? '<br><small style="color:#888;">' + action.description.substring(0, 80) + '...</small>' : ''}
                    </td>
                    <td>${action.type || '-'}</td>
                    <td>${action.year || '-'}</td>
                    <td><span class="badge">${action.status || '-'}</span></td>
                    <td>
                        ${action.is_approved
                            ? '<span class="badge badge-approved">&#10004; Approuv&#233;e</span>'
                            : '<span class="badge badge-pending">&#9203; En attente</span>'
                        }
                    </td>
                    <td style="white-space:nowrap;">
                        ${!action.is_approved ? '<button class="btn btn-primary btn-sm" onclick="approveAction(' + action.id + ')" style="margin-right:4px;">&#10004; Approuver</button>' : ''}
                        <button class="btn btn-secondary btn-sm" onclick="editFromTable(${action.id})" style="margin-right:4px;">&#9998; &#201;diter</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteAction(${action.id})">Supprimer</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function editFromTable(id) {
            const action = (window._actionsMap || {})[id];
            if (action) openModal(action);
        }

        async function fetchActions() {
            const { data, error } = await supabaseClient.from('actions').select('*').order('created_at', { ascending: false });
            if (data) {
                allActions = data;
                // Update counter pill
                const pending = data.filter(a => !a.is_approved);
                const pill = document.getElementById('pending-count');
                if (pending.length > 0) {
                    pill.textContent = pending.length;
                    pill.style.display = 'inline-block';
                } else {
                    pill.style.display = 'none';
                }
                renderTable();
            }
        }

        async function approveAction(id) {
            const { error } = await supabaseClient.from('actions').update({ is_approved: true }).eq('id', id);
            if (error) alert('Erreur: ' + error.message);
            else fetchActions();
        }

        function openModal(action = null) {
            modal.style.display = 'block';
            if (action) {
                document.getElementById('modal-title').textContent = "Modifier l'Action";
                document.getElementById('action-id').value = action.id;
                document.getElementById('action-title').value = action.title;
                document.getElementById('action-club-id').value = action.club_id || '';
                document.getElementById('action-type').value = action.type || '';
                document.getElementById('action-year').value = action.year || '';
                document.getElementById('action-status').value = action.status || '';
                document.getElementById('action-location').value = action.location || '';
                document.getElementById('action-image').value = action.image || '';
                document.getElementById('action-description').value = action.description || '';
                document.getElementById('action-beneficiaries').value = action.beneficiaries || '';
                document.getElementById('action-results').value = action.results || '';
                document.getElementById('action-partners').value = action.partners || '';
                document.getElementById('action-photo2').value = action.photo2 || '';
                document.getElementById('action-photo3').value = action.photo3 || '';
                document.getElementById('action-photo4').value = action.photo4 || '';
                document.getElementById('action-approved').checked = action.is_approved !== false;
            } else {
                document.getElementById('modal-title').textContent = "Nouvelle Action";
                form.reset();
                document.getElementById('action-id').value = '';
                document.getElementById('action-approved').checked = true;
            }
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('action-id').value;
            const actionData = {
                title: document.getElementById('action-title').value,
                club_id: document.getElementById('action-club-id').value || null,
                type: document.getElementById('action-type').value,
                year: document.getElementById('action-year').value,
                status: document.getElementById('action-status').value,
                location: document.getElementById('action-location').value,
                image: document.getElementById('action-image').value,
                description: document.getElementById('action-description').value,
                beneficiaries: document.getElementById('action-beneficiaries').value,
                results: document.getElementById('action-results').value,
                partners: document.getElementById('action-partners').value,
                photo2: document.getElementById('action-photo2').value,
                photo3: document.getElementById('action-photo3').value,
                photo4: document.getElementById('action-photo4').value,
                is_approved: document.getElementById('action-approved').checked
            };

            const { error } = id 
                ? await supabaseClient.from('actions').update(actionData).eq('id', id)
                : await supabaseClient.from('actions').insert([actionData]);

            if (error) alert("Erreur: " + error.message);
            else {
                closeModal();
                fetchActions();
            }
        };

        async function deleteAction(id) {
            if (confirm("Supprimer cette action ?")) {
                const { error } = await supabaseClient.from('actions').delete().eq('id', id);
                if (error) alert("Erreur: " + error.message);
                else fetchActions();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchClubs();
            fetchActions();
        });
    </script>
</body>
</html>
